<!DOCTYPE html>

        header {

            font-size: 18px;

            transition: all 0.3s;

        }
        .btn:hover {

            transform: translateY(-3px);

        }
        /* 急救电话完全独立，不在任何白色卡片内 */

            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

            display: block;
            width: 100%;
            background: linear-gradient(135deg, #1a5f7a 0%, #2d9596 100%);

            text-align: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;

            text-align: center;
        }
        .qrcode-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .qrcode-items {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .qrcode-item {
            text-align: center;
        }
        .qrcode-item img {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .qrcode-item p {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 14px;
